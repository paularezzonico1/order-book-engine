name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Release build + full test suite (the "production" configuration).
  release:
    name: Release build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Benchmark smoke run
        run: ./build/obe_bench --commands 200000 --depth 20

  # Debug build with AddressSanitizer + UndefinedBehaviorSanitizer.
  sanitizers:
    name: Debug build & test (ASan/UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure (Debug + sanitizers)
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-asan -j

      - name: Test under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure
